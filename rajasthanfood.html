<!DOCTYPE html>
<html lang="en">
<head>

    <title>Rajasthan Food</title>
    <link rel="stylesheet" href="rajasthanfood.css">
    <style>
* {
    margin: 0;

}

.main {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background-image: url("assets/rajasthan-food.svg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    flex-direction: column;

    justify-content: center;
    color: white;
    z-index: 1;

}

.main::before {

<body>
    <div class="main">

        <ul>
            <li>Dal Baati Churma</li>
